<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Data Historis Pengambilan Air Baku — Sumber Air Baku</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div>
      <div class="brand">Perumda Tirta Manuntung — Sumber Air Baku</div>
      <h1>Data Historis Pengambilan Air Baku <span class="dummy-badge" id="statusBadge">Memuat...</span></h1>
    </div>
    <div class="top-note">Rekap debit pengambilan air baku bulanan. Pilih kategori & instalasi, atur rentang tahun/bulan, lalu unduh sesuai kebutuhan.</div>
  </header>

  <!-- Menu utama: Air Permukaan (AP) / Air Tanah Dalam (ATD) -->
  <div class="menu-main" id="menuMain"></div>
  <!-- Sub menu: instalasi di dalam kategori yang aktif -->
  <div class="menu-sub" id="menuSub"></div>
  <!-- Menu agregat: Jumlah (Total) & Rekapitulasi, dipisah dari daftar instalasi -->
  <div class="menu-category" id="menuAgg"></div>

  <div class="panel">
    <div class="controls">
      <div class="field time-field">
        <label>Rentang data — <span id="rangeLabel">Semua Data</span></label>
        <div class="year-row" id="yearRow"></div>
      </div>

      <div class="spacer"></div>

      <div class="dl-group">
        <button class="dl-btn dl-btn-guest" id="downloadPdfBtn">Unduh PDF</button>
        <button class="dl-btn dl-btn-admin" id="downloadExcelBtn">🔒 Unduh Excel (Admin)</button>
      </div>
    </div>

    <div class="main-grid" id="mainGrid">
      <div class="chart-box"><canvas id="mainChart"></canvas></div>
      <div class="gauge-wrap">
        <div class="gauge-label">Nilai Terakhir vs Historis</div>
        <div class="gauge-track">
          <div class="gauge-marker" id="gaugeAvgMarker"></div>
          <div class="gauge-fill" id="gaugeFill"></div>
        </div>
        <div class="gauge-value" id="gaugeValue">--</div>
      </div>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="table-scroll" id="tableWrap">
      <table>
        <thead><tr id="tableHead"></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="table-scroll rekap-scroll" id="rekapWrap" style="display:none;">
      <table class="rekap-table">
        <thead><tr id="rekapHead"></tr></thead>
        <tbody id="rekapBody"></tbody>
      </table>
    </div>

    <div class="note" id="noteBox"></div>
  </div>

  <div class="page-footer-note">
    <a href="../../index.html">&larr; Kembali ke Beranda</a>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
