<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulir Pekerjaan SAB</title>
<style>
  :root{
    --ink:#1c2b3a;
    --navy:#1f3a5f;
    --navy-dark:#152840;
    --paper:#f6f4ee;
    --card:#ffffff;
    --line:#dfdad0;
    --muted:#6b7280;
    --accent:#a9762f;
    --accent-soft:#f1e6d3;
    --danger:#b3413a;
    --ok:#2f7a4d;
    --ok-soft:#e5f1e8;
    --radius:10px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
  .topbar{
    background:var(--navy);color:#fff;padding:16px 20px;
    display:flex;flex-direction:column;gap:2px;
  }
  .topbar h1{font-size:17px;margin:0;font-weight:700;}
  .topbar span{font-size:12px;color:#cdd8e6;}
  .wrap{max-width:560px;margin:0 auto;padding:16px;}

  .progress-row{display:flex;align-items:center;gap:10px;margin:14px 0 18px;}
  .progress-track{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--navy);border-radius:99px;transition:width .25s ease;}
  .progress-label{font-size:12px;color:var(--muted);white-space:nowrap;font-weight:600;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px;min-height:220px;}
  .card h2{font-size:15px;margin:0 0 4px;color:var(--navy-dark);}
  .card .hint{font-size:12.5px;color:var(--muted);margin:0 0 16px;}

  label.opt{
    display:flex;align-items:center;gap:10px;
    border:1px solid var(--line);border-radius:8px;
    padding:12px 14px;margin-bottom:8px;cursor:pointer;font-size:14.5px;
    transition:border-color .15s, background .15s;
  }
  label.opt:hover{border-color:var(--navy);}
  label.opt.checked{border-color:var(--navy);background:var(--accent-soft);font-weight:600;}
  label.opt input{accent-color:var(--navy);width:17px;height:17px;flex-shrink:0;}

  input[type=text], input[type=time], textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:7px;
    font-size:14.5px;font-family:inherit;background:#fff;color:var(--ink);
  }
  input:focus, textarea:focus{outline:2px solid var(--navy);outline-offset:1px;}
  textarea{resize:vertical;min-height:90px;}
  label.field{display:block;font-size:12.5px;color:var(--muted);margin:14px 0 5px;}
  label.field:first-child{margin-top:0;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  .gps-box{
    border:1px dashed var(--accent);background:var(--accent-soft);
    border-radius:8px;padding:12px 14px;font-size:13px;margin-top:6px;
  }
  .gps-box.ok{border-color:var(--ok);background:var(--ok-soft);}
  .gps-box .coord{font-family:"Times New Roman",Times,serif;font-size:14px;font-weight:700;color:var(--navy-dark);}
  .gps-box .status{color:var(--muted);margin-top:2px;}
  .gps-retry{
    margin-top:8px;background:none;border:1px solid var(--navy);color:var(--navy);
    padding:6px 10px;border-radius:6px;font-size:12.5px;cursor:pointer;
  }

  .photo-drop{
    border:1.5px dashed var(--line);border-radius:8px;padding:16px;text-align:center;
    cursor:pointer;background:#fdfcfa;
  }
  .photo-drop:hover{border-color:var(--navy);}
  .photo-preview{max-width:100%;border-radius:6px;margin-top:10px;display:none;}

  .nav-row{display:flex;gap:10px;}
  .btn{flex:1;padding:13px;border-radius:9px;font-size:14.5px;font-weight:700;cursor:pointer;border:none;letter-spacing:.2px;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-dark);}
  .btn-primary:disabled{background:#a9b4c0;cursor:not-allowed;}
  .btn-ghost{background:#fff;color:var(--navy);border:1.5px solid var(--navy);flex:0 0 90px;}

  .review-item{border-bottom:1px solid var(--line);padding:8px 0;font-size:13.5px;display:flex;justify-content:space-between;gap:10px;}
  .review-item .k{color:var(--muted);}
  .review-item .v{font-weight:600;text-align:right;}

  .status-msg{font-size:13px;text-align:center;margin-top:8px;min-height:18px;}
  .status-msg.error{color:var(--danger);}
  .status-msg.ok{color:var(--ok);font-weight:600;}
  .spinner{
    width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;
    border-radius:50%;display:inline-block;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="topbar">
  <h1>Formulir Pekerjaan SAB</h1>
  <span>Laporan perbaikan lapangan</span>
</div>

<div class="wrap">
  <div class="progress-row">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">Bagian 1</div>
  </div>

  <div id="stepArea"></div>

  <div class="nav-row">
    <button type="button" class="btn btn-ghost" id="backBtn">Kembali</button>
    <button type="button" class="btn btn-primary" id="nextBtn">Lanjut</button>
  </div>
  <div class="status-msg" id="statusMsg"></div>
</div>

<script>
// ============== KONFIGURASI ==============
// Ganti dengan URL Web App hasil deploy Apps Script kamu (lihat Code.gs)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8B3ts6p93DuAW-cYbh_hoHXKb1jZgIs2GeXWY5Sw0sIot9IfFFdFh_VGpxyQt9iTX/exec";
// ==========================================

const state = {
  itemPerbaikan:'',
  diameterTransmisi:'', diameterTransmisiLain:'',
  diameterSumur:'', diameterSumurLain:'',
  materialPipa:'',
  namaKontraktor:'',
  adaPengadaan:'', barangPengadaan:'',
  adaGudangInduk:'', barangGudangInduk:'',
  jamMulai:'', jamSelesai:'',
  fotoBase64:'', fotoMime:'', fotoName:'',
  gpsLat:null, gpsLng:null, gpsAccuracy:null
};

// Definisi seluruh step. "show" menentukan apakah step ini relevan (logika percabangan).
const steps = [
  { id:'item', title:'Item Perbaikan', show:()=>true },
  { id:'diaTransmisi', title:'Diameter Pipa Transmisi', show:()=>state.itemPerbaikan==='Pipa Transmisi' },
  { id:'diaSumur', title:'Diameter Pipa Sumur', show:()=>state.itemPerbaikan==='Pipa Sumur' },
  { id:'material', title:'Material Pipa', show:()=>state.itemPerbaikan!=='Jalan' },
  { id:'kontraktor', title:'Perusahaan Kontraktor', show:()=>true },
  { id:'pengadaanYN', title:'Barang Pengadaan?', show:()=>true },
  { id:'pengadaanDetail', title:'Detail Barang Pengadaan', show:()=>state.adaPengadaan==='Ya' },
  { id:'gudangYN', title:'Barang Gudang Induk?', show:()=>true },
  { id:'gudangDetail', title:'Detail Barang Gudang Induk', show:()=>state.adaGudangInduk==='Ya' },
  { id:'durasi', title:'Durasi Pekerjaan', show:()=>true },
  { id:'fotoGps', title:'Foto & Koordinat GPS', show:()=>true },
  { id:'review', title:'Periksa & Kirim', show:()=>true },
];

let current = 0;

function visibleSteps(){ return steps.filter(s=>s.show()); }
function currentDef(){ return visibleSteps()[current]; }

function render(){
  const vis = visibleSteps();
  if(current >= vis.length) current = vis.length-1;
  const def = vis[current];

  document.getElementById('progressLabel').textContent = `Bagian ${current+1} dari ${vis.length}`;
  document.getElementById('progressFill').style.width = ((current+1)/vis.length*100)+'%';
  document.getElementById('backBtn').style.visibility = current===0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').textContent = def.id==='review' ? 'Kirim Laporan' : 'Lanjut';

  document.getElementById('stepArea').innerHTML = renderStep(def.id);
  attachStepEvents(def.id);
  document.getElementById('statusMsg').textContent='';
  document.getElementById('statusMsg').className='status-msg';

  if(def.id==='fotoGps') requestGps();
}

function optHtml(name, value, current, extra){
  const checked = current===value ? 'checked' : '';
  const cls = current===value ? 'opt checked' : 'opt';
  return `<label class="${cls}"><input type="radio" name="${name}" value="${value}" ${checked}> ${value}</label>${extra||''}`;
}

function renderStep(id){
  switch(id){
    case 'item':
      return `<div class="card"><h2>Item Perbaikan</h2><p class="hint">Pilih jenis pekerjaan yang dilakukan.</p>
        ${optHtml('item','Pipa Transmisi', state.itemPerbaikan)}
        ${optHtml('item','Pipa Sumur', state.itemPerbaikan)}
        ${optHtml('item','Jalan', state.itemPerbaikan)}
      </div>`;

    case 'diaTransmisi':
      return `<div class="card"><h2>Diameter Pipa Transmisi</h2><p class="hint">Pilih ukuran diameter pipa.</p>
        ${['400 mm','500 mm','600 mm','700 mm','800 mm'].map(v=>optHtml('diaT',v,state.diameterTransmisi)).join('')}
        ${optHtml('diaT','Yang lain', state.diameterTransmisi)}
        ${state.diameterTransmisi==='Yang lain' ? `<label class="field">Sebutkan diameter</label><input type="text" id="diaTLain" value="${state.diameterTransmisiLain}">` : ''}
      </div>`;

    case 'diaSumur':
      return `<div class="card"><h2>Diameter Pipa Sumur</h2><p class="hint">Pilih ukuran diameter pipa.</p>
        ${['2 Inch','3 Inch','4 Inch','6 Inch','8 Inch'].map(v=>optHtml('diaS',v,state.diameterSumur)).join('')}
        ${optHtml('diaS','Yang lain', state.diameterSumur)}
        ${state.diameterSumur==='Yang lain' ? `<label class="field">Sebutkan diameter</label><input type="text" id="diaSLain" value="${state.diameterSumurLain}">` : ''}
      </div>`;

    case 'material':
      return `<div class="card"><h2>Material Pipa</h2><p class="hint">Pilih jenis material pipa.</p>
        ${['Steel','Ductile','HDPE','PVC','PVC-O'].map(v=>optHtml('material',v,state.materialPipa)).join('')}
      </div>`;

    case 'kontraktor':
      return `<div class="card"><h2>Nama Perusahaan Kontraktor</h2><p class="hint">Isi nama perusahaan pelaksana.</p>
        <input type="text" id="kontraktor" placeholder="Nama perusahaan" value="${state.namaKontraktor}">
      </div>`;

    case 'pengadaanYN':
      return `<div class="card"><h2>Apakah Ada Barang Pengadaan?</h2>
        ${optHtml('pengadaanYN','Ya', state.adaPengadaan)}
        ${optHtml('pengadaanYN','Tidak', state.adaPengadaan)}
      </div>`;

    case 'pengadaanDetail':
      return `<div class="card"><h2>Barang Pengadaan Apa dan Berapa?</h2>
        <textarea id="pengadaanDetail" placeholder="Contoh: Pipa PVC 4 inch 2 batang">${state.barangPengadaan}</textarea>
      </div>`;

    case 'gudangYN':
      return `<div class="card"><h2>Apakah Ada Barang Gudang Induk?</h2>
        ${optHtml('gudangYN','Ya', state.adaGudangInduk)}
        ${optHtml('gudangYN','Tidak', state.adaGudangInduk)}
      </div>`;

    case 'gudangDetail':
      return `<div class="card"><h2>Barang Gudang Induk Apa dan Berapa?</h2>
        <textarea id="gudangDetail" placeholder="Contoh: Klem pipa 3 buah">${state.barangGudangInduk}</textarea>
      </div>`;

    case 'durasi':
      return `<div class="card"><h2>Durasi Pekerjaan</h2>
        <label class="field">Pekerjaan Dari Jam</label>
        <input type="time" id="jamMulai" value="${state.jamMulai}">
        <label class="field">Pekerjaan Selesai Jam</label>
        <input type="time" id="jamSelesai" value="${state.jamSelesai}">
      </div>`;

    case 'fotoGps':
      return `<div class="card">
        <h2>Foto Perbaikan</h2><p class="hint">Landscape, ukuran file akan dikecilkan otomatis.</p>
        <div class="photo-drop" onclick="document.getElementById('fotoInput').click()">
          <span id="photoLabel">${state.fotoName ? state.fotoName : 'Ketuk untuk ambil / pilih foto'}</span>
          <img class="photo-preview" id="photoPreview" style="${state.fotoBase64 ? 'display:block' : ''}" src="${state.fotoBase64 ? 'data:'+state.fotoMime+';base64,'+state.fotoBase64 : ''}">
        </div>
        <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none">

        <h2 style="margin-top:18px;">Koordinat GPS</h2>
        <div class="gps-box" id="gpsBox">
          <div class="status" id="gpsStatus">Mengambil lokasi...</div>
        </div>
        <button type="button" class="gps-retry" id="gpsRetry">Ambil ulang lokasi</button>
      </div>`;

    case 'review':
      return `<div class="card"><h2>Periksa Kembali</h2><p class="hint">Pastikan data sudah benar sebelum dikirim.</p>
        ${reviewRow('Item Perbaikan', state.itemPerbaikan)}
        ${state.itemPerbaikan==='Pipa Transmisi' ? reviewRow('Diameter', state.diameterTransmisi==='Yang lain'?state.diameterTransmisiLain:state.diameterTransmisi) : ''}
        ${state.itemPerbaikan==='Pipa Sumur' ? reviewRow('Diameter', state.diameterSumur==='Yang lain'?state.diameterSumurLain:state.diameterSumur) : ''}
        ${state.itemPerbaikan!=='Jalan' ? reviewRow('Material Pipa', state.materialPipa) : ''}
        ${reviewRow('Kontraktor', state.namaKontraktor)}
        ${reviewRow('Barang Pengadaan', state.adaPengadaan==='Ya' ? state.barangPengadaan : 'Tidak ada')}
        ${reviewRow('Barang Gudang Induk', state.adaGudangInduk==='Ya' ? state.barangGudangInduk : 'Tidak ada')}
        ${reviewRow('Jam Kerja', (state.jamMulai||'-')+' – '+(state.jamSelesai||'-'))}
        ${reviewRow('Foto', state.fotoName || 'Belum ada')}
        ${reviewRow('GPS', state.gpsLat ? state.gpsLat.toFixed(6)+', '+state.gpsLng.toFixed(6) : 'Belum ada')}
      </div>`;
  }
}

function reviewRow(k,v){ return `<div class="review-item"><span class="k">${k}</span><span class="v">${v||'-'}</span></div>`; }

function attachStepEvents(id){
  document.querySelectorAll('input[type=radio]').forEach(r=>{
    r.addEventListener('change', e=>{
      const name=e.target.name, val=e.target.value;
      if(name==='item') state.itemPerbaikan=val;
      if(name==='diaT') state.diameterTransmisi=val;
      if(name==='diaS') state.diameterSumur=val;
      if(name==='material') state.materialPipa=val;
      if(name==='pengadaanYN') state.adaPengadaan=val;
      if(name==='gudangYN') state.adaGudangInduk=val;
      render();
    });
  });
  const map = {
    diaTLain:v=>state.diameterTransmisiLain=v,
    diaSLain:v=>state.diameterSumurLain=v,
    kontraktor:v=>state.namaKontraktor=v,
    pengadaanDetail:v=>state.barangPengadaan=v,
    gudangDetail:v=>state.barangGudangInduk=v,
    jamMulai:v=>state.jamMulai=v,
    jamSelesai:v=>state.jamSelesai=v,
  };
  Object.keys(map).forEach(k=>{
    const el=document.getElementById(k);
    if(el) el.addEventListener('input', e=>map[k](e.target.value));
  });

  if(id==='fotoGps'){
    document.getElementById('fotoInput').addEventListener('change', handlePhoto);
    document.getElementById('gpsRetry').addEventListener('click', requestGps);
  }
}

function handlePhoto(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const result = reader.result;
    state.fotoBase64 = result.split(',')[1];
    state.fotoMime = file.type;
    state.fotoName = file.name;
    document.getElementById('photoLabel').textContent = file.name;
    const prev = document.getElementById('photoPreview');
    prev.src = result;
    prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function requestGps(){
  const box = document.getElementById('gpsBox');
  if(!box) return;
  box.classList.remove('ok');
  box.innerHTML = `<div class="status">Mengambil lokasi...</div>`;
  if(!navigator.geolocation){
    box.innerHTML = `<div class="status">Perangkat tidak mendukung GPS. Isi manual jika perlu.</div>`;
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    state.gpsLat = pos.coords.latitude;
    state.gpsLng = pos.coords.longitude;
    state.gpsAccuracy = pos.coords.accuracy;
    box.classList.add('ok');
    box.innerHTML = `<div class="coord">${state.gpsLat.toFixed(6)}, ${state.gpsLng.toFixed(6)}</div>
      <div class="status">Akurasi ±${Math.round(state.gpsAccuracy)} meter</div>`;
  }, err=>{
    box.innerHTML = `<div class="status">Gagal mengambil lokasi (${err.message}). Coba lagi atau periksa izin lokasi browser.</div>`;
  }, { enableHighAccuracy:true, timeout:15000 });
}

function validateCurrent(){
  const def = currentDef();
  switch(def.id){
    case 'item': return state.itemPerbaikan ? '' : 'Pilih item perbaikan dulu ya.';
    case 'diaTransmisi': return state.diameterTransmisi ? '' : 'Pilih diameter pipa transmisi.';
    case 'diaSumur': return state.diameterSumur ? '' : 'Pilih diameter pipa sumur.';
    case 'material': return state.materialPipa ? '' : 'Pilih material pipa.';
    case 'kontraktor': return state.namaKontraktor.trim() ? '' : 'Isi nama perusahaan kontraktor.';
    case 'pengadaanYN': return state.adaPengadaan ? '' : 'Pilih salah satu.';
    case 'pengadaanDetail': return state.barangPengadaan.trim() ? '' : 'Isi detail barang pengadaan.';
    case 'gudangYN': return state.adaGudangInduk ? '' : 'Pilih salah satu.';
    case 'gudangDetail': return state.barangGudangInduk.trim() ? '' : 'Isi detail barang gudang induk.';
    case 'durasi': return (state.jamMulai && state.jamSelesai) ? '' : 'Isi jam mulai dan selesai.';
    case 'fotoGps':
      if(!state.fotoBase64) return 'Ambil / pilih foto perbaikan dulu.';
      if(!state.gpsLat) return 'Koordinat GPS belum berhasil diambil.';
      return '';
    default: return '';
  }
}

document.getElementById('backBtn').addEventListener('click', ()=>{
  if(current>0){ current--; render(); }
});

document.getElementById('nextBtn').addEventListener('click', async ()=>{
  const def = currentDef();
  if(def.id !== 'review'){
    const err = validateCurrent();
    const msg = document.getElementById('statusMsg');
    if(err){ msg.textContent = err; msg.className='status-msg error'; return; }
    current++;
    render();
  } else {
    submitForm();
  }
});

async function submitForm(){
  const btn = document.getElementById('nextBtn');
  const msg = document.getElementById('statusMsg');
  if(SCRIPT_URL.indexOf('GANTI_DENGAN')===0 || SCRIPT_URL.includes('GANTI_DENGAN')){
    msg.textContent = 'SCRIPT_URL belum diisi di dalam kode HTML ini.';
    msg.className = 'status-msg error';
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Mengirim...';
  msg.textContent=''; msg.className='status-msg';

  const payload = {
    itemPerbaikan: state.itemPerbaikan,
    diameterPipaTransmisi: state.diameterTransmisi==='Yang lain' ? state.diameterTransmisiLain : state.diameterTransmisi,
    diameterPipaSumur: state.diameterSumur==='Yang lain' ? state.diameterSumurLain : state.diameterSumur,
    materialPipa: state.materialPipa,
    namaKontraktor: state.namaKontraktor,
    adaBarangPengadaan: state.adaPengadaan,
    barangPengadaan: state.barangPengadaan,
    adaBarangGudangInduk: state.adaGudangInduk,
    barangGudangInduk: state.barangGudangInduk,
    jamMulai: state.jamMulai,
    jamSelesai: state.jamSelesai,
    gpsLat: state.gpsLat,
    gpsLng: state.gpsLng,
    gpsAccuracy: state.gpsAccuracy,
    foto: { base64: state.fotoBase64, mimeType: state.fotoMime, filename: state.fotoName }
  };

  try{
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' }, // hindari CORS preflight
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if(data.status==='ok'){
      msg.textContent = 'Laporan berhasil dikirim. Terima kasih!';
      msg.className='status-msg ok';
      btn.textContent = 'Terkirim';
    } else {
      throw new Error(data.message || 'Gagal tanpa keterangan');
    }
  }catch(err){
    msg.textContent = 'Gagal mengirim: ' + err.message;
    msg.className='status-msg error';
    btn.disabled = false;
    btn.textContent = 'Kirim Laporan';
  }
}

render();
</script>
</body>
</html>
